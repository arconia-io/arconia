plugins {
    id "code-quality-conventions"
    id "java-conventions"
    id "sbom-conventions"
    id "release-conventions"
}

dependencies {
    annotationProcessor "org.springframework.boot:spring-boot-autoconfigure-processor"
    annotationProcessor "org.springframework.boot:spring-boot-configuration-processor"

    api project(":arconia-dev:arconia-dev-services:arconia-dev-services-core")
    api("org.springframework.ai:spring-ai-spring-boot-testcontainers") {
        exclude group: "org.springframework.boot", module : "spring-boot-starter-data-mongodb"
    }
    api "org.springframework.boot:spring-boot-starter"
    api "org.springframework.boot:spring-boot-testcontainers"
    api "org.testcontainers:testcontainers-ollama"

    optional "org.springframework.boot:spring-boot-devtools"
    optional "org.springframework.ai:spring-ai-autoconfigure-model-ollama"
    optional "org.springframework.ai:spring-ai-autoconfigure-model-openai"

    testImplementation project(":arconia-dev:arconia-dev-services:arconia-dev-services-tests")
    testImplementation "org.springframework.ai:spring-ai-autoconfigure-model-ollama"
    testImplementation "org.springframework.ai:spring-ai-autoconfigure-model-openai"
    testImplementation "org.springframework.boot:spring-boot-starter-test"
    testImplementation "org.testcontainers:testcontainers-junit-jupiter"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"

    constraints {
        implementation("io.modelcontextprotocol.sdk:mcp-core:1.1.1") {
            because "CVE-2026-34237: Upgrade transitive dependency from Spring AI Chat Client"
        }
    }
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom {
                name = "Arconia Dev Services Ollama"
                description = "Arconia Dev Services Ollama."
            }
        }
    }
}
